server {
    listen 80;
    server_name localhost;

    # Resolver is required when using variables for proxy_pass
    # 127.0.0.11 is the default Docker DNS resolver IP
    resolver 127.0.0.11 valid=30s;

    # Serve static files directly from Nginx (bypassing Flask for speed)
    location /static/ {
        alias /app/static/;
    }

    # Forward all other HTTP traffic to the Flask app container
    location / {
        # Using a variable prevents Nginx from failing configuration check
        # if the 'app' container is not online/reachable at startup
        set $upstream http://app:5000;
        proxy_pass $upstream;

        # Recommended proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}